<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cats_image</title>
  <link rel="stylesheet" href="/styles/main.css" />
</head>

<body>
  <div class="container">
    <header>
      <h1>cats image</h1>
      <p class="subtitle">A random cat, every time.</p>
    </header>

    <main>
      <div class="card" id="card">
        <div class="img-wrap">
          <img id="cat-img" src="" alt="Random cat" />
          <div class="skeleton" id="skeleton"></div>
        </div>
        <div class="meta" id="meta"></div>
      </div>

      <button id="btn" onclick="fetchCat()">New cat</button>
    </main>

    <footer>
      <span>Powered by <a href="https://thecatapi.com" target="_blank">The Cat API</a>, built with <a
          href="https://github.com/carlossruuizz/apislol" target="_blank">apislol</a></span>
    </footer>
  </div>

  <script src="/js/app.js"></script>
</body>

</html>
